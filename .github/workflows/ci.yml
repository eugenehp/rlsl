name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Formatting & linting ──────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install mold
        run: sudo apt-get update && sudo apt-get install -y mold
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy (workspace, exclude lsl-py/lsl-wasm)
        run: >
          cargo clippy
          -p lsl-core -p lsl-sys -p exg -p lsl-rec -p lsl-rec-gui -p lsl-cli
          -- -D warnings

  # ── Dependency audit ──────────────────────────────────────────────
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans sources

  # ── Build & test on all platforms ─────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      # mold is Linux-only
      - name: Install mold
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y mold

      # Remove Linux-specific linker config on non-Linux
      - name: Remove mold config (non-Linux)
        if: runner.os != 'Linux'
        shell: bash
        run: rm -f .cargo/config.toml

      - name: Build workspace
        run: >
          cargo build
          -p lsl-core -p lsl-sys -p exg -p lsl-rec -p lsl-cli
          --target ${{ matrix.target }}

      # GUI needs extra deps on Linux
      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libvulkan-dev

      - name: Build GUI
        run: cargo build -p lsl-rec-gui --target ${{ matrix.target }}

      - name: Build bridge
        run: >
          cargo build -p lsl-wasm --features bridge --bin lsl-bridge
          --target ${{ matrix.target }}

      - name: Unit tests (lsl-core)
        run: cargo test -p lsl-core --target ${{ matrix.target }}

      - name: E2E tests (lsl-rec)
        if: runner.os == 'Linux'
        run: cargo test -p lsl-rec --target ${{ matrix.target }} -- --nocapture

      - name: Check liblsl symbols
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            nm -gU target/${{ matrix.target }}/debug/liblsl.dylib | grep ' T _lsl_' | wc -l
          elif [ "$RUNNER_OS" = "Linux" ]; then
            nm -D target/${{ matrix.target }}/debug/liblsl.so | grep ' T lsl_' | wc -l
          else
            echo "(symbol check skipped on Windows)"
          fi

  # ── Benchmarks (compile check only) ──────────────────────────────
  bench:
    name: Benchmarks
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install mold
        run: sudo apt-get update && sudo apt-get install -y mold
      - name: Check benchmarks compile
        run: cargo bench --no-run

  # ── Documentation ─────────────────────────────────────────────────
  docs:
    name: Rustdoc
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install mold
        run: sudo apt-get update && sudo apt-get install -y mold
      - name: Build docs
        run: cargo doc --workspace --no-deps --exclude lsl-py --exclude lsl-wasm
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── WASM build ────────────────────────────────────────────────────
  wasm:
    name: WASM build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Remove mold config (WASM uses lld)
        run: rm -f .cargo/config.toml
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM package
        working-directory: crates/lsl-wasm
        run: wasm-pack build --target web --features wasm --no-default-features

  # ── Python wheels ─────────────────────────────────────────────────
  python:
    name: Python (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Remove mold config (maturin handles linking)
        shell: bash
        run: rm -f .cargo/config.toml
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -m crates/lsl-py/Cargo.toml --out dist
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.os }}
          path: dist/*.whl

  # ── Docker build ──────────────────────────────────────────────────
  docker:
    name: Docker
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t lsl-rs:ci .
      - name: Verify image
        run: docker run --rm lsl-rs:ci version
