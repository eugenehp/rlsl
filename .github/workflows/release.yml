name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ── Build native binaries ─────────────────────────────────────────
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            lib_ext: ".so"
          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: ""
            lib_ext: ".so"
            cross: true
          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            ext: ""
            lib_ext: ".dylib"
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            lib_ext: ".dylib"
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            lib_ext: ".dll"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      # mold linker on Linux
      - name: Install mold
        if: runner.os == 'Linux' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y mold

      # Remove mold config on non-Linux
      - name: Remove mold config (non-Linux)
        if: runner.os != 'Linux'
        shell: bash
        run: rm -f .cargo/config.toml

      # Cross-compilation for Linux aarch64
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      # Linux GUI deps
      - name: Install Linux deps
        if: runner.os == 'Linux' && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libvulkan-dev

      # Build all release binaries
      - name: Build (native)
        if: "!matrix.cross"
        run: >
          cargo build --release --target ${{ matrix.target }}
          -p lsl-rec -p lsl-rec-gui -p lsl-sys -p lsl-cli
          &&
          cargo build --release --target ${{ matrix.target }}
          -p lsl-wasm --features bridge --bin lsl-bridge

      - name: Build (cross)
        if: matrix.cross
        run: >
          cross build --release --target ${{ matrix.target }}
          -p lsl-rec -p lsl-sys -p lsl-cli
          &&
          cross build --release --target ${{ matrix.target }}
          -p lsl-wasm --features bridge --bin lsl-bridge

      # Package artifacts
      - name: Package
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          DIR="lsl-rs-${TAG}-${{ matrix.name }}"
          mkdir -p "$DIR"

          # Binaries
          for BIN in lsl lsl-rec lsl-bridge; do
            SRC="target/${{ matrix.target }}/release/${BIN}${{ matrix.ext }}"
            if [ -f "$SRC" ]; then
              cp "$SRC" "$DIR/"
            fi
          done

          # GUI binary (not built for cross)
          SRC="target/${{ matrix.target }}/release/lsl-rec-gui${{ matrix.ext }}"
          if [ -f "$SRC" ]; then
            cp "$SRC" "$DIR/"
          fi

          # Shared library (liblsl)
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/lsl.dll "$DIR/" 2>/dev/null || true
            cp target/${{ matrix.target }}/release/lsl.dll.lib "$DIR/" 2>/dev/null || true
          else
            cp target/${{ matrix.target }}/release/liblsl${{ matrix.lib_ext }} "$DIR/" 2>/dev/null || true
          fi

          # Include docs
          cp README.md LICENSE* "$DIR/" 2>/dev/null || true

          # Archive
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "${DIR}.zip" "$DIR"
          else
            tar czf "${DIR}.tar.gz" "$DIR"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: lsl-rs-*.*

  # ── WASM package ──────────────────────────────────────────────────
  wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        working-directory: crates/lsl-wasm
        run: wasm-pack build --release --target web --features wasm --no-default-features
      - name: Package WASM
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          DIR="lsl-wasm-${TAG}"
          mkdir -p "$DIR"
          cp -r crates/lsl-wasm/pkg/* "$DIR/"
          cp crates/lsl-wasm/www/index.html "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-wasm
          path: lsl-wasm-*.tar.gz

  # ── Python wheels (all platforms) ─────────────────────────────────
  python:
    name: Python (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64
            manylinux: auto
          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64
            manylinux: auto
          - name: macos-x86_64
            os: macos-13
            target: x86_64
            manylinux: auto
          - name: macos-aarch64
            os: macos-latest
            target: aarch64
            manylinux: auto
          - name: windows-x86_64
            os: windows-latest
            target: x64
            manylinux: auto
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: >
            --release -m crates/lsl-py/Cargo.toml
            --out dist
            --interpreter 3.9 3.10 3.11 3.12 3.13
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: python-${{ matrix.name }}
          path: dist/*.whl

  # ── Create GitHub Release ─────────────────────────────────────────
  release:
    name: Create Release
    needs: [build, wasm, python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/release-*/*
            artifacts/python-*/*.whl
          body: |
            ## Downloads

            ### Native binaries
            | Platform | Archive |
            |----------|---------|
            | Linux x86_64 | `lsl-rs-${{ github.ref_name }}-linux-x86_64.tar.gz` |
            | Linux aarch64 | `lsl-rs-${{ github.ref_name }}-linux-aarch64.tar.gz` |
            | macOS x86_64 | `lsl-rs-${{ github.ref_name }}-macos-x86_64.tar.gz` |
            | macOS aarch64 | `lsl-rs-${{ github.ref_name }}-macos-aarch64.tar.gz` |
            | Windows x86_64 | `lsl-rs-${{ github.ref_name }}-windows-x86_64.zip` |

            Each archive contains: `lsl` (CLI), `lsl-rec`, `lsl-rec-gui`, `lsl-bridge`, `liblsl.{dylib,so,dll}`

            ### Python wheels (`pip install pylsl`)
            Pre-built for Python 3.9–3.13 on Linux/macOS/Windows.
            ```
            pip install pylsl --find-links https://github.com/eugenehp/lsl-rs/releases/download/${{ github.ref_name }}/
            ```

            ### WASM package
            `lsl-wasm-${{ github.ref_name }}.tar.gz` — includes `lsl_wasm.js`, `.wasm`, and demo `index.html`.

  # ── Publish Python wheels to PyPI ─────────────────────────────────
  pypi:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: python-*
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*.whl

  # ── Publish WASM package to npm ────────────────────────────────────
  npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Build WASM
        working-directory: crates/lsl-wasm
        run: wasm-pack build --release --target web --features wasm --no-default-features --scope lsl-rs
      - name: Publish to npm
        working-directory: crates/lsl-wasm/pkg
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Docker image ──────────────────────────────────────────────────
  docker:
    name: Publish Docker image
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/eugenehp/lsl-rs:${{ github.ref_name }}
            ghcr.io/eugenehp/lsl-rs:latest
